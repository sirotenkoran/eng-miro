<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eng Lesson</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #stage {
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
      background: #fff;
    }
    #lesson {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #fff;
    }
    #toggle-btn {
      position: fixed; top: 12px; right: 12px; z-index: 99999;
      padding: 8px 14px;
      background: #1a1a1a; color: #fff; border: 0; border-radius: 8px;
      font: 500 13px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.2); opacity: 0.85;
    }
    #toggle-btn:hover:not([disabled]) { opacity: 1; }
    #toggle-btn[disabled] { cursor: progress; opacity: 0.6; }
  </style>
</head>
<body>
  <div id="stage">
    <iframe id="lesson" title="Lesson"></iframe>
  </div>
  <button id="toggle-btn" type="button"></button>

  <script>
    (function () {
      'use strict';
      const ENG_VERSION = '2026-05-18-v11';
      console.log('%c[eng frame] version ' + ENG_VERSION + ' loaded at ' + new Date().toISOString(),
                  'color:#4262ff;font-weight:bold');

      const params = new URLSearchParams(window.location.search);
      const lessonId = (params.get('lesson') || 'lead-in').replace(/[^\w-]/g, '');
      const mode = params.get('mode') === 'panel' ? 'panel' : 'modal';

      const frame = document.getElementById('lesson');
      frame.src = lessonId + '.html?v=' + Date.now();

      frame.addEventListener('load', function () {
        console.log('[eng frame] iframe loaded',
                    'viewport:', window.innerWidth + 'x' + window.innerHeight,
                    'iframe:', frame.clientWidth + 'x' + frame.clientHeight);
      });

      const btn = document.getElementById('toggle-btn');
      btn.textContent = mode === 'modal' ? '← Side panel' : 'Fullscreen ⤢';
      btn.title = mode === 'modal' ? 'Reopen as side panel' : 'Reopen as fullscreen';

      btn.onclick = function () {
        btn.disabled = true;
        btn.textContent = 'Switching…';
        const next = mode === 'modal' ? 'panel' : 'modal';
        const payload = { type: 'switch', from: mode, to: next, lessonId: lessonId };
        console.log('[eng frame] requesting switch', payload);
        try {
          const bc = new BroadcastChannel('eng-app');
          bc.postMessage(payload);
        } catch (e) {
          console.error('[eng frame] BroadcastChannel failed', e);
          btn.disabled = false;
          btn.textContent = mode === 'modal' ? '← Side panel' : 'Fullscreen ⤢';
        }
      };
    })();
  </script>
</body>
</html>
